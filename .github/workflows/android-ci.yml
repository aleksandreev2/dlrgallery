name: Android CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.0"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.5.0 --distribution-type bin

      - name: Commit generated Gradle wrapper
        if: github.event_name == 'push'
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- gradlew gradlew.bat gradle/wrapper)" ]]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper
          git commit -m "Add Gradle wrapper"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Build debug APK
        id: build
        shell: bash
        run: |
          set +e
          ./gradlew :app:assembleDebug --stacktrace --console=plain > build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 160 build.log
          exit 0

      - name: Report build failure
        if: steps.build.outputs.status != '0' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lines = fs.readFileSync('build.log', 'utf8').split('\n');
            const tail = lines.slice(-120).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Android CI build failure\n\n\`\`\`text\n${tail}\n\`\`\``
            });

      - name: Fail unsuccessful build
        if: steps.build.outputs.status != '0'
        run: exit 1

      - name: Upload debug APK
        if: steps.build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: dlr-gallery-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build.log
          if-no-files-found: ignore
